plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.billtt.riddle'
    compileSdk 34

    defaultConfig {
        applicationId 'com.billtt.riddle'
        minSdk 28            // BOOX Note X2 出厂为 Android 11 (API 30)
        targetSdk 34
        versionCode 1
        versionName '0.1.0'
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }

    packagingOptions {
        jniLibs {
            // onyxsdk-pen 与其依赖 mmkv 都自带 libc++_shared.so
            pickFirsts += ['lib/*/libc++_shared.so']
        }
        resources {
            excludes += [
                'META-INF/DEPENDENCIES',
                'META-INF/INDEX.LIST',
                'META-INF/LICENSE*',
                'META-INF/NOTICE*',
                'META-INF/*.kotlin_module',
                'META-INF/versions/**',
            ]
        }
    }

    lint {
        abortOnError false
    }
}

dependencies {
    // Onyx BOOX SDK：低延迟原始笔迹输入 + 电子墨水屏刷新控制
    implementation 'com.onyx.android.sdk:onyxsdk-pen:1.5.4'
    implementation 'com.onyx.android.sdk:onyxsdk-device:1.3.5'

    // Anthropic 官方 Java SDK（Claude API，视觉识别手写内容）
    implementation 'com.anthropic:anthropic-java:2.34.0'

    // OpenAI 后端走 Chat Completions（兼容任意 OpenAI-compatible 接口）
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'

    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1'
}
